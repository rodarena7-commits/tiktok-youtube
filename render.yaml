services:
  - type: web
    name: music-youtube-auto
    env: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      # Contraseña para el panel web
      - key: UPLOAD_PASSWORD
        sync: false

      # Google OAuth (console.cloud.google.com)
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      # Debe coincidir exactamente con lo que pusiste en Google Cloud Console
      - key: YOUTUBE_REDIRECT_URI
        sync: false
      # Se obtiene visitando /auth después del primer deploy
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false

      # Pixabay API — registro gratuito en pixabay.com/api/
      # Misma clave sirve para música y videos de fondo
      - key: PIXABAY_API_KEY
        sync: false

      # ── Configuración del generador ───────────────────────
      # Categorías habilitadas (separadas por coma)
      # Opciones: sleep, study, focus, travel, ambient
      - key: MUSIC_CATEGORIES
        value: "sleep,study,focus,travel,ambient"
      # Cada cuántas horas buscar música nueva (mínimo 1)
      - key: AUTO_INTERVAL_HOURS
        value: "6"
      # Máximo de videos a generar y subir por ejecución
      - key: MAX_VIDEOS_PER_RUN
        value: "3"
      # Privacidad de los videos: public | unlisted | private
      - key: AUTO_PRIVACY
        value: public
