<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎵 Music Auto-Upload</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
           background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 1.5rem }
    .container { max-width: 860px; margin: 0 auto }

    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: .25rem }
    .subtitle { color: #94a3b8; font-size: .9rem; margin-bottom: 2rem }

    .card { background: #1e293b; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem }
    .card-title { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em;
                  color: #64748b; margin-bottom: .75rem; font-weight: 600 }

    .status-row { display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: .5rem }
    .badge { display: inline-flex; align-items: center; gap: .35rem; padding: .3rem .75rem;
             border-radius: 999px; font-size: .8rem; font-weight: 500 }
    .badge.ok      { background: #064e3b; color: #6ee7b7 }
    .badge.warn    { background: #451a03; color: #fbbf24 }
    .badge.running { background: #1e1b4b; color: #a5b4fc }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0 }
    .dot.green  { background: #34d399 }
    .dot.yellow { background: #fbbf24 }
    .dot.blue   { background: #818cf8; animation: pulse 1.2s infinite }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .cats { display: flex; flex-wrap: wrap; gap: .5rem; margin-top: .5rem }
    .cat  { background: #0f172a; border-radius: 8px; padding: .4rem .85rem;
            font-size: .82rem; color: #94a3b8 }

    .form-row { display: flex; gap: .75rem; align-items: center; flex-wrap: wrap }
    input[type=password] { background: #0f172a; border: 1px solid #334155; color: #e2e8f0;
                           border-radius: 8px; padding: .55rem .9rem; font-size: .9rem;
                           flex: 1; min-width: 200px; outline: none }
    input[type=password]:focus { border-color: #6366f1 }
    button { background: #6366f1; color: #fff; border: none; border-radius: 8px;
             padding: .55rem 1.25rem; font-size: .9rem; font-weight: 600;
             cursor: pointer; white-space: nowrap }
    button:hover    { background: #4f46e5 }
    button:disabled { background: #334155; cursor: not-allowed; color: #64748b }

    .msg { margin-top: .75rem; padding: .6rem 1rem; border-radius: 8px; font-size: .85rem }
    .msg.ok    { background: #064e3b; color: #6ee7b7 }
    .msg.error { background: #450a0a; color: #fca5a5 }

    .log-box { background: #0f172a; border-radius: 8px; padding: .75rem 1rem;
               font-family: monospace; font-size: .78rem; max-height: 220px;
               overflow-y: auto; color: #94a3b8; margin-top: .75rem; white-space: pre-wrap }

    table  { width: 100%; border-collapse: collapse }
    th     { text-align: left; font-size: .72rem; text-transform: uppercase;
             letter-spacing: .06em; color: #64748b; padding-bottom: .5rem; font-weight: 600 }
    td     { padding: .6rem 0; border-top: 1px solid #0f172a; font-size: .83rem; vertical-align: top }
    td a   { color: #818cf8; text-decoration: none }
    td a:hover { text-decoration: underline }
    .cat-badge { display: inline-block; padding: .15rem .55rem; border-radius: 999px;
                 font-size: .72rem; background: #0f172a; color: #94a3b8 }
    .empty { color: #64748b; text-align: center; padding: 2rem 0 }

    .link-btn { display: inline-block; background: #0f172a; border: 1px solid #334155;
                color: #94a3b8; border-radius: 8px; padding: .4rem .85rem;
                font-size: .82rem; text-decoration: none; margin-top: .75rem }
    .link-btn:hover { border-color: #6366f1; color: #a5b4fc }
  </style>
</head>
<body>
<div class="container">
  <h1>🎵 Music Auto-Upload</h1>
  <p class="subtitle">Genera y sube videos de música libre de derechos a YouTube automáticamente — Pixabay + FFmpeg</p>

  <!-- Estado del sistema -->
  <div class="card">
    <div class="card-title">Estado del sistema</div>
    <div class="status-row" id="statusBadges">
      <span class="badge warn"><span class="dot yellow"></span>Cargando...</span>
    </div>
    <div class="cats" id="catsList"></div>
    <div style="margin-top:.75rem;font-size:.82rem;color:#64748b" id="lastRun"></div>
    <a class="link-btn" href="/auth">🔑 Autenticar YouTube</a>
  </div>

  <!-- Trigger manual -->
  <div class="card">
    <div class="card-title">Forzar generación ahora</div>
    <div class="form-row">
      <input type="password" id="pwd" placeholder="Contraseña del panel">
      <button id="runBtn" onclick="runNow()">▶ Generar videos</button>
    </div>
    <div id="runMsg"></div>
    <div id="logBox" class="log-box" style="display:none"></div>
  </div>

  <!-- Historial -->
  <div class="card">
    <div class="card-title">Historial de videos subidos</div>
    <table>
      <thead>
        <tr>
          <th>Video</th>
          <th>Categoría</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="3" class="empty">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
  const CAT_LABELS = {
    sleep:  '🌙 Dormir',
    study:  '📚 Estudiar',
    focus:  '🎯 Concentrarse',
    travel: '✈️ Viajar',
    ambient:'🌿 Ambiente',
  }

  async function loadStatus() {
    try {
      const s = await fetch('/auto/status').then(r => r.json())
      const badges = document.getElementById('statusBadges')
      badges.innerHTML = ''

      const addBadge = (cls, dot, text) => {
        badges.innerHTML += `<span class="badge ${cls}"><span class="dot ${dot}"></span>${text}</span>`
      }

      if (s.running) addBadge('running', 'blue', 'Generando ahora...')
      addBadge(s.ytConfigured      ? 'ok' : 'warn',
               s.ytConfigured      ? 'green' : 'yellow',
               s.ytConfigured      ? 'YouTube ✓' : 'YouTube sin auth')
      addBadge(s.pixabayConfigured ? 'ok' : 'warn',
               s.pixabayConfigured ? 'green' : 'yellow',
               s.pixabayConfigured ? 'Pixabay API ✓' : 'Pixabay sin clave')

      document.getElementById('catsList').innerHTML =
        (s.categories || []).map(c => `<span class="cat">${CAT_LABELS[c] || c}</span>`).join('')

      if (s.lastRunAt) {
        const ago = timeSince(new Date(s.lastRunAt))
        const lr  = s.lastRunResult
        let extra = ''
        if (lr) extra = lr.ok
          ? ` — ${lr.uploaded ?? 0} subidos, ${lr.skipped ?? 0} ya existentes`
          : ` — ❌ ${lr.error}`
        document.getElementById('lastRun').textContent = `Última ejecución: hace ${ago}${extra}`
      }

      const logs = s.liveLogs || s.lastRunResult?.logs
      const box  = document.getElementById('logBox')
      if (logs && logs.length) {
        box.style.display = 'block'
        box.textContent = logs.map(l => l.msg).join('\n')
        box.scrollTop = box.scrollHeight
      } else if (!s.running) {
        box.style.display = 'none'
      }

      document.getElementById('runBtn').disabled = s.running
      if (s.running) setTimeout(loadStatus, 3000)
    } catch (e) { console.error(e) }
  }

  async function loadHistory() {
    try {
      const { videos } = await fetch('/auto/history').then(r => r.json())
      const tbody = document.getElementById('historyBody')
      if (!videos || videos.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty">Todavía no hay videos subidos</td></tr>'
        return
      }
      tbody.innerHTML = videos.map(v => {
        const d       = new Date(v.uploadedAt)
        const dateStr = d.toLocaleDateString('es-AR', { day:'2-digit', month:'short', year:'numeric' })
        const link = v.youtubeUrl && v.youtubeUrl !== 'undefined'
          ? `<a href="${v.youtubeUrl}" target="_blank">${esc(v.title)}</a>`
          : esc(v.title)
        return `<tr>
          <td>${link}</td>
          <td><span class="cat-badge">${CAT_LABELS[v.category] || v.category}</span></td>
          <td style="color:#64748b;white-space:nowrap">${dateStr}</td>
        </tr>`
      }).join('')
    } catch (e) { console.error(e) }
  }

  async function runNow() {
    const pwd = document.getElementById('pwd').value
    const msg = document.getElementById('runMsg')
    const btn = document.getElementById('runBtn')
    btn.disabled = true
    msg.className = ''; msg.textContent = ''
    try {
      const res  = await fetch('/auto/run', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd }),
      })
      const data = await res.json()
      if (res.ok) {
        msg.className = 'msg ok'
        msg.textContent = '✅ Generación iniciada — los logs aparecen abajo en unos segundos'
        setTimeout(loadStatus, 3000)
      } else {
        msg.className = 'msg error'
        msg.textContent = '❌ ' + (data.error || 'Error desconocido')
        btn.disabled = false
      }
    } catch (e) {
      msg.className = 'msg error'
      msg.textContent = '❌ Error de red: ' + e.message
      btn.disabled = false
    }
  }

  function timeSince(date) {
    const s = Math.floor((Date.now() - date) / 1000)
    if (s < 60)    return s + ' seg'
    if (s < 3600)  return Math.floor(s / 60) + ' min'
    if (s < 86400) return Math.floor(s / 3600) + ' h'
    return Math.floor(s / 86400) + ' d'
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  }

  loadStatus()
  loadHistory()
  setInterval(loadStatus,  15000)
  setInterval(loadHistory, 30000)
</script>
</body>
</html>
